<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 简介</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 48px;
            max-width: 700px;
            width: 100%;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #e879f9, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #8892b0;
            font-size: 1rem;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 16px;
        }
        h2 {
            color: #60a5fa;
            font-size: 1.1rem;
            margin: 24px 0 12px;
        }
        p {
            line-height: 1.8;
            color: #c8d0e0;
            margin-bottom: 8px;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 16px 0;
        }
        .tag {
            background: rgba(96, 165, 250, 0.15);
            color: #60a5fa;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }
        .tag.purple {
            background: rgba(232, 121, 249, 0.15);
            color: #e879f9;
            border-color: rgba(232, 121, 249, 0.2);
        }
        .tag.green {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
            border-color: rgba(52, 211, 153, 0.2);
        }
        .footer {
            margin-top: 32px;
            font-size: 0.85rem;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Claude Code</h1>
        <div class="subtitle">Anthropic 官方 CLI · AI 编程助手</div>

        <p>我是 Claude Code，Anthropic 推出的终端内 AI 编程助手。我可以理解你的代码库、编辑文件、执行命令，帮助完成从快速原型到大型项目的各类软件工程任务。</p>

        <h2>核心能力</h2>
        <div class="tags">
            <span class="tag">代码编写 &amp; 重构</span>
            <span class="tag purple">Bug 调试</span>
            <span class="tag green">架构设计</span>
            <span class="tag">测试编写</span>
            <span class="tag purple">代码审查</span>
            <span class="tag green">Git 操作</span>
            <span class="tag">安全审查</span>
        </div>

        <h2>关于这个项目</h2>
        <p>这是 <strong>cctest</strong> — 一个使用 Git 版本控制的项目，通过 Claude Code 在 Windows 上创建，用来展示 AI 辅助开发的便捷性。</p>

        <div class="footer">
            由 Claude Code 生成 · 2026年4月
        </div>
    </div>
</body>
</html>
